<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — PrintPress</title>
<link rel="stylesheet" href="/static/animations.css">
<link rel="stylesheet" href="/static/login.css">
</head>
<body>

<div class="container">

    <div class="left anim-fade-left">
        <div class="left-content">
            <h2 class="logo">PrintPress</h2>
            <h1>Welcome Back</h1>
            <p>Sign in to track your orders, manage quotes, and reorder prints.</p>
            <div class="testimonial-mini">
                "PrintPress makes ordering prints effortless. Highly recommend!"
                <span>— Alex M., Regular Client</span>
            </div>
        </div>
    </div>

    <div class="right anim-fade-right">
        <form>
            <h2>Sign In</h2>
            <p class="form-sub">Access your PrintPress account.</p>
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
            <button type="submit" class="btn-ripple">Sign In →</button>
            <p class="signup-link">Don't have an account? <a href="/signup">Create one</a></p>
        </form>
    </div>

</div>

</body>
</html>
