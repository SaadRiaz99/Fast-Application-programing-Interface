<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - PrintPress</title>
    <link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>

<div class="sidebar">
    <h2>PrintPress</h2>
    <ul>
        <li>Dashboard</li>
        <li>Orders</li>
        <li>Products</li>
        <li>Customers</li>
        <li>Quote Requests</li>
    </ul>
</div>

<div class="main">

    <header>
        <h1>Admin Dashboard</h1>
        <button>+ New Order</button>
    </header>

    <section class="cards">
        <div class="card">
            <h3>Pending Orders</h3>
            <p>23</p>
        </div>
        <div class="card">
            <h3>In Production</h3>
            <p>12</p>
        </div>
        <div class="card">
            <h3>Monthly Revenue</h3>
            <p>$18,420</p>
        </div>
        <div class="card">
            <h3>Quote Requests</h3>
            <p>8</p>
        </div>
    </section>

</div>

</body>
</html>
