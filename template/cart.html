<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - PrintPress</title>
<link rel="stylesheet" href="/static/cart.css">
</head>
<body>

<nav>
    <h2>PrintPress</h2>
    <a href="/products">Continue Shopping</a>
</nav>

<section class="cart">
    <h1>Your Cart</h1>

    <div class="cart-item">
        <div class="item-details">
            <h3>Business Cards — 500 qty</h3>
            <p>350gsm Matte, Standard Size</p>
        </div>
        <div class="qty">
            <button>-</button>
            <span>1</span>
            <button>+</button>
        </div>
        <p class="total">$25.00</p>
    </div>

    <div class="cart-item">
        <div class="item-details">
            <h3>Flyers A5 — 1000 qty</h3>
            <p>150gsm Gloss, Full Color</p>
        </div>
        <div class="qty">
            <button>-</button>
            <span>2</span>
            <button>+</button>
        </div>
        <p class="total">$80.00</p>
    </div>

    <div class="summary">
        <p>Subtotal: <strong>$105.00</strong></p>
        <a href="/checkout"><button>Proceed to Checkout</button></a>
    </div>
</section>

<footer>
    <p>&copy; 2026 PrintPress. All rights reserved.</p>
</footer>

</body>
</html>
