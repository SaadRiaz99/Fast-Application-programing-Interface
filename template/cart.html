<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - ShopFast</title>
<link rel="stylesheet" href="/static/cart.css">
</head>
<body>

<nav>
    <h2>ShopFast</h2>
    <a href="/">Continue Shopping</a>
</nav>

<section class="cart">
    <h1>Shopping Cart</h1>

    <div class="cart-item">
        <img src="https://placehold.co/100x100" alt="Product">
        <div>
            <h3>Wireless Headphones</h3>
            <p>$79.99</p>
        </div>
        <div class="qty">
            <button>-</button>
            <span>1</span>
            <button>+</button>
        </div>
        <p class="total">$79.99</p>
    </div>

    <div class="cart-item">
        <img src="https://placehold.co/100x100" alt="Product">
        <div>
            <h3>Smart Watch</h3>
            <p>$199.99</p>
        </div>
        <div class="qty">
            <button>-</button>
            <span>1</span>
            <button>+</button>
        </div>
        <p class="total">$199.99</p>
    </div>

    <div class="summary">
        <p>Subtotal: <strong>$279.98</strong></p>
        <a href="/checkout"><button>Checkout</button></a>
    </div>
</section>

</body>
</html>
