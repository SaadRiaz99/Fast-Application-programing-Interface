<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders - ShopFast</title>
<link rel="stylesheet" href="/static/orders.css">
</head>
<body>

<nav>
    <h2>ShopFast</h2>
    <a href="/">Home</a>
</nav>

<section class="orders">
    <h1>My Orders</h1>

    <div class="order">
        <div class="order-header">
            <span><strong>#ORD-1024</strong></span>
            <span>Jun 15, 2026</span>
            <span class="status delivered">Delivered</span>
        </div>
        <div class="order-body">
            <img src="https://placehold.co/80x80" alt="Product">
            <div>
                <h3>Wireless Headphones</h3>
                <p>$79.99 x 1</p>
            </div>
            <p class="order-total">$79.99</p>
        </div>
    </div>

    <div class="order">
        <div class="order-header">
            <span><strong>#ORD-1023</strong></span>
            <span>Jun 10, 2026</span>
            <span class="status shipped">Shipped</span>
        </div>
        <div class="order-body">
            <img src="https://placehold.co/80x80" alt="Product">
            <div>
                <h3>Leather Backpack</h3>
                <p>$59.99 x 1</p>
            </div>
            <p class="order-total">$59.99</p>
        </div>
    </div>
</section>

</body>
</html>
