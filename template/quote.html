<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get a Quote - PrintPress</title>
<link rel="stylesheet" href="/static/quote.css">
</head>
<body>

<nav>
    <h2>PrintPress</h2>
    <div>
        <a href="/">Home</a>
        <a href="/services">Services</a>
        <a href="/products">Products</a>
        <a href="/contact">Contact</a>
    </div>
</nav>

<section class="page-header">
    <h1>Request a Quote</h1>
    <p>Tell us about your project and we'll get back to you within 24 hours.</p>
</section>

<section class="quote-form">
    <form>
        <div class="form-row">
            <input type="text" placeholder="Your Name">
            <input type="email" placeholder="Email Address">
        </div>
        <div class="form-row">
            <input type="text" placeholder="Company Name">
            <input type="text" placeholder="Phone Number">
        </div>
        <select>
            <option>Select Print Type</option>
            <option>Business Cards</option>
            <option>Flyers / Leaflets</option>
            <option>Brochures</option>
            <option>Banners</option>
            <option>Stickers / Labels</option>
            <option>Apparel</option>
            <option>Other</option>
        </select>
        <input type="text" placeholder="Quantity">
        <textarea placeholder="Describe your project — size, paper type, finish, deadline, etc."></textarea>

        <button type="submit">Send Request</button>
    </form>
</section>

<footer>
    <p>&copy; 2026 PrintPress. All rights reserved.</p>
</footer>

</body>
</html>
