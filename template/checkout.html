<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - PrintPress</title>
<link rel="stylesheet" href="/static/checkout.css">
</head>
<body>

<nav>
    <h2>PrintPress</h2>
    <a href="/cart">Back to Cart</a>
</nav>

<section class="checkout">
    <h1>Checkout</h1>

    <form>
        <h3>Contact Information</h3>
        <input type="text" placeholder="Full Name">
        <input type="email" placeholder="Email">
        <input type="text" placeholder="Phone">

        <h3>Delivery Address</h3>
        <input type="text" placeholder="Street Address">
        <input type="text" placeholder="City">
        <input type="text" placeholder="Postal Code">

        <h3>Order Notes</h3>
        <textarea placeholder="Special instructions, proofing requests, or delivery notes..."></textarea>

        <button type="submit">Place Order — $105.00</button>
    </form>
</section>

<footer>
    <p>&copy; 2026 PrintPress. All rights reserved.</p>
</footer>

</body>
</html>
